name: Test and Validate

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

env:
  GO_VERSION: "1.21"

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache-dependency-path: go.sum

    - name: Install dependencies
      run: |
        go mod download
        go mod tidy

    - name: Run linters
      run: |
        # Install golangci-lint if not present
        if ! command -v golangci-lint &> /dev/null; then
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.58.2
        fi
        make lint

    - name: Run unit tests
      run: make test

    - name: Build Lambda functions
      run: make build-all

    - name: Validate i18n files
      run: |
        # Check if Node.js is needed for i18n validation
        if [ -f "scripts/validate-i18n.js" ]; then
          # Setup Node.js if needed
          if ! command -v node &> /dev/null; then
            echo "Node.js not found, skipping i18n validation"
          else
            make validate-i18n
          fi
        fi