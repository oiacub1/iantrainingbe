name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # JOB 1: TEST (Runs on PRs and Main)
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install dependencies
        run: |
          go mod download
          go mod tidy

      - name: Run Tests
        run: go test -v -race ./...

      - name: Build for local testing
        run: make build ENV=local

  # JOB 2: DEPLOY (Runs ONLY on Main, and ONLY if 'test' passes)
  deploy:
    name: Deploy Lambda Function
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Install dependencies
        run: |
          go mod download
          go mod tidy

      - name: Build Go binary (ARM64 for Lambda)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
          go build -ldflags="-s -w" -o bootstrap ./cmd/api
          chmod +x bootstrap

      - name: Create ZIP file
        run: zip bootstrap.zip bootstrap

      - name: Check if DynamoDB table exists
        id: check-table
        run: |
          if aws dynamodb describe-table --table-name "training-platform" --region "${{ secrets.AWS_REGION || 'us-east-1' }}" 2>/dev/null; then
            echo "Table training-platform exists"
            echo "table_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Table training-platform does not exist"
            echo "table_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create DynamoDB table if needed
        if: steps.check-table.outputs.table_exists == 'false'
        run: |
          echo "Creating DynamoDB table: training-platform"
          
          aws dynamodb create-table \
            --table-name "training-platform" \
            --attribute-definitions \
              AttributeName=PK,AttributeType=S \
              AttributeName=SK,AttributeType=S \
              AttributeName=GSI1PK,AttributeType=S \
              AttributeName=GSI1SK,AttributeType=S \
              AttributeName=GSI2PK,AttributeType=S \
              AttributeName=GSI2SK,AttributeType=S \
            --key-schema \
              AttributeName=PK,KeyType=HASH \
              AttributeName=SK,KeyType=RANGE \
            --billing-mode PAY_PER_REQUEST \
            --global-secondary-indexes \
              '[{
                "IndexName": "GSI1",
                "KeySchema": [
                  {"AttributeName":"GSI1PK","KeyType":"HASH"},
                  {"AttributeName":"GSI1SK","KeyType":"RANGE"}
                ],
                "Projection":{"ProjectionType":"ALL"}
              },
              {
                "IndexName": "GSI2",
                "KeySchema": [
                  {"AttributeName":"GSI2PK","KeyType":"HASH"},
                  {"AttributeName":"GSI2SK","KeyType":"RANGE"}
                ],
                "Projection":{"ProjectionType":"ALL"}
              }]' \
            --stream-specification StreamEnabled=true,StreamViewType=NEW_AND_OLD_IMAGES \
            --sse-specification Enabled=true \
            --region "${{ secrets.AWS_REGION || 'us-east-1' }}"
          
          echo "Waiting for table to become active..."
          aws dynamodb wait table-exists --table-name "training-platform" --region "${{ secrets.AWS_REGION || 'us-east-1' }}"
          echo "Table training-platform created successfully!"

      - name: Upload to AWS Lambda
        run: |
          # Check if Lambda function exists
          if aws lambda get-function --function-name "IanTrainingBackend" --region "${{ secrets.AWS_REGION || 'us-east-1' }}" 2>/dev/null; then
            echo "Updating existing Lambda function: IanTrainingBackend"
            aws lambda update-function-code \
              --function-name "IanTrainingBackend" \
              --zip-file fileb://bootstrap.zip \
              --region "${{ secrets.AWS_REGION || 'us-east-1' }}"
            echo "Updated Lambda function: IanTrainingBackend"
          else
            echo "Creating new Lambda function: IanTrainingBackend"
            aws lambda create-function \
              --function-name "IanTrainingBackend" \
              --runtime provided.al2 \
              --handler bootstrap \
              --zip-file fileb://bootstrap.zip \
              --role arn:aws:iam::234541249007:role/lambda-execution-role \
              --region "${{ secrets.AWS_REGION || 'us-east-1' }}"
            echo "Created Lambda function: IanTrainingBackend"
          fi

      - name: Verify deployment
        run: |
          echo "Verifying deployment..."
          
          # Lambda function details
          echo "Lambda function details:"
          aws lambda get-function \
            --function-name "IanTrainingBackend" \
            --region "${{ secrets.AWS_REGION || 'us-east-1' }}" \
            --query "Function.{FunctionName:FunctionName, Runtime:Runtime, Handler:Handler, CodeSize:CodeSize, LastModified:LastModified}" \
            --output table
          
          # DynamoDB table status
          echo "DynamoDB table status:"
          aws dynamodb describe-table \
            --table-name "training-platform" \
            --region "${{ secrets.AWS_REGION || 'us-east-1' }}" \
            --query "Table.{TableName:TableName, TableStatus:TableStatus, ItemCount:ItemCount}" \
            --output table

      - name: Test Lambda function
        run: |
          echo "Testing Lambda function..."
          
          # Check if Lambda is running by getting function info
          echo "Checking Lambda function status..."
          aws lambda get-function \
            --function-name "IanTrainingBackend" \
            --region "${{ secrets.AWS_REGION || 'us-east-1' }}" \
            --query "Function.{State:State, LastUpdateStatus:LastUpdateStatus, Runtime:Runtime, CodeSize:CodeSize}" \
            --output table
          
          # Check if function is active
          FUNCTION_STATUS=$(aws lambda get-function \
            --function-name "IanTrainingBackend" \
            --region "${{ secrets.AWS_REGION || 'us-east-1' }}" \
            --query "Function.State" \
            --output text)
          
          if [ "$FUNCTION_STATUS" = "Active" ]; then
            echo "✅ Lambda function is Active and ready"
          else
            echo "❌ Lambda function status: $FUNCTION_STATUS"
            exit 1
          fi
          
          # Get function configuration
          echo "Function configuration:"
          aws lambda get-function-configuration \
            --function-name "IanTrainingBackend" \
            --region "${{ secrets.AWS_REGION || 'us-east-1' }}" \
            --query "{Runtime:Runtime,Handler:Handler,Role:Role,MemorySize:MemorySize,Timeout:Timeout}" \
            --output table
