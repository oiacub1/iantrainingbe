name: Deploy Lambda and Setup DynamoDB

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  GO_VERSION: "1.25"
  DYNAMODB_TABLE_NAME: "training-platform"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
        cache-dependency-path: go.sum

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION || env.AWS_REGION }}

    - name: Install dependencies
      run: |
        go mod download
        go mod tidy

    - name: Run tests
      run: make test

    - name: Build Lambda functions
      run: make build-all

    - name: Check if DynamoDB table exists
      id: check-table
      run: |
        if aws dynamodb describe-table --table-name "$DYNAMODB_TABLE_NAME" --region "$AWS_REGION" 2>/dev/null; then
          echo "Table $DYNAMODB_TABLE_NAME exists"
          echo "table_exists=true" >> $GITHUB_OUTPUT
        else
          echo "Table $DYNAMODB_TABLE_NAME does not exist"
          echo "table_exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Create DynamoDB table if needed
      if: steps.check-table.outputs.table_exists == 'false'
      run: |
        echo "Creating DynamoDB table: $DYNAMODB_TABLE_NAME"
        
        # Create table with proper GSI configuration based on Terraform definition
        aws dynamodb create-table \
          --table-name "$DYNAMODB_TABLE_NAME" \
          --attribute-definitions \
            AttributeName=PK,AttributeType=S \
            AttributeName=SK,AttributeType=S \
            AttributeName=GSI1PK,AttributeType=S \
            AttributeName=GSI1SK,AttributeType=S \
            AttributeName=GSI2PK,AttributeType=S \
            AttributeName=GSI2SK,AttributeType=S \
          --key-schema \
            AttributeName=PK,KeyType=HASH \
            AttributeName=SK,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes \
            '[{
              "IndexName": "GSI1",
              "KeySchema": [
                {"AttributeName":"GSI1PK","KeyType":"HASH"},
                {"AttributeName":"GSI1SK","KeyType":"RANGE"}
              ],
              "Projection":{"ProjectionType":"ALL"}
            },
            {
              "IndexName": "GSI2",
              "KeySchema": [
                {"AttributeName":"GSI2PK","KeyType":"HASH"},
                {"AttributeName":"GSI2SK","KeyType":"RANGE"}
              ],
              "Projection":{"ProjectionType":"ALL"}
            }]' \
          --stream-specification StreamEnabled=true,StreamViewType=NEW_AND_OLD_IMAGES \
          --sse-specification Enabled=true \
          # --point-in-time-recovery-specification PointInTimeRecoveryEnabled=true \
          --region "$AWS_REGION"
        
        echo "Waiting for table to become active..."
        aws dynamodb wait table-exists --table-name "$DYNAMODB_TABLE_NAME" --region "$AWS_REGION"
        echo "Table $DYNAMODB_TABLE_NAME created successfully!"

    - name: Update Lambda function code
      run: |
        echo "Updating Lambda functions..."
        
        # Find all built Lambda functions
        for lambda_zip in bin/*/bootstrap.zip; do
          if [ -f "$lambda_zip" ]; then
            lambda_name=$(basename $(dirname "$lambda_zip"))
            function_name="training-platform-$lambda_name"
            
            echo "Updating Lambda function: $function_name"
            
            # Check if Lambda function exists
            if aws lambda get-function --function-name "$function_name" --region "$AWS_REGION" 2>/dev/null; then
              # Update existing function
              aws lambda update-function-code \
                --function-name "$function_name" \
                --zip-file "fileb://$lambda_zip" \
                --region "$AWS_REGION"
              echo "Updated Lambda function: $function_name"
            else
              echo "Lambda function $function_name does not exist. Skipping update."
              echo "Note: Lambda function creation should be handled by Terraform infrastructure."
            fi
          fi
        done

    - name: Verify deployment
      run: |
        echo "Verifying deployment..."
        
        # List Lambda functions
        echo "Available Lambda functions:"
        aws lambda list-functions --region "$AWS_REGION" --query "Functions[?starts_with(FunctionName, 'training-platform-')].FunctionName" --output table
        
        # Verify DynamoDB table
        echo "DynamoDB table status:"
        aws dynamodb describe-table \
          --table-name "$DYNAMODB_TABLE_NAME" \
          --region "$AWS_REGION" \
          --query "Table.{TableName:TableName, TableStatus:TableStatus, ItemCount:ItemCount, GSIs:GlobalSecondaryIndexes[*].IndexName}" \
          --output table